name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: agentplat_test
          POSTGRES_USER: agentplat_test
          POSTGRES_PASSWORD: agentplat_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U agentplat_test -d agentplat_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 20
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm run check
      - run: pnpm --filter @agentplat/rooms-postgres test
        env:
          AGENTPLAT_POSTGRES_TEST: '1'
          PGHOST: 127.0.0.1
          PGPORT: '5432'
          PGDATABASE: agentplat_test
          PGUSER: agentplat_test
          PGPASSWORD: agentplat_test
